name: CI

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['**']

jobs:
    format-check:
        name: Prettier format check
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
            - run: npm ci
            - run: npm run format:check

    lint:
        name: ESLint
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
            - run: npm ci
            - run: npm run lint

    typecheck:
        name: TypeScript type check
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
            - run: npm ci
            - run: npm run typecheck

    test:
        name: Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
            - run: npm ci
            - run: npm run test:run

    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm
            - run: npm ci
            - run: npm run build
